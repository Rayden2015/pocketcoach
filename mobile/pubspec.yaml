name: pocket_coach_mobile
description: Cross-platform Pocket Coach learner app (Laravel API client starter).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_markdown: ^0.7.4+1
  google_sign_in: ^6.2.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
